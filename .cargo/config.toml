# No [build] target default: `cargo ledger build <device>` passes the target
# itself, and a default here would leak into the nested `host/` crate (cargo
# merges configs from parent directories), breaking native builds.
[target.nanosplus]
runner = "speculos -m nanosp"

[profile.release]
opt-level = 'z'
lto = true

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]

# Largest authorised heap: NIP-46 request JSON, its parsed form and the
# re-encrypted response all live on the heap at once during a dispatch.
[env]
HEAP_SIZE = "24576"
